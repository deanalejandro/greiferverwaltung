<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Greifer Anlage NX</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:40px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#d40000;
}

.info{
    margin:15px 0;
    font-size:18px;
}

.status{
    color:green;
    font-weight:bold;
}

.sensor{
    background:#f7f7f7;
    padding:15px;
    border-radius:8px;
    margin-top:20px;
}

.footer{
    margin-top:30px;
    font-size:14px;
    color:gray;
}
</style>

</head>

<body>

<div class="container">

<h1>KUKA 001</h1>

<div class="info"><strong>Roboter:</strong> Robi1</div>

<div class="info"><strong>Typ:</strong> Primärgreifer</div>

<div class="info">
<strong>Status:</strong>
<span class="status">Einsatzbereit</span>
</div>

<div class="sensor">
<h3>Sensoreinstellungen</h3>

<p><strong>B001:</strong> -</p>
<p><strong>B002:</strong> -</p>
<p><strong>B003:</strong> -</p>

</div>

<div class="footer">
Letzte Wartung: XX.XX.XXXX
</div>

</div>

</body>
</html>
